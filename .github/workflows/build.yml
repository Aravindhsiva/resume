name: Build Resume PDFs

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build Resumes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            latexmk

      - name: Compile and Collect Resumes
        run: |
          mkdir -p artifacts
          for dir in uk luxembourg canada unitedstates; do
            echo "Building $dir..."
            (cd "$dir" && latexmk -pdf -interaction=nonstopmode -halt-on-error resume.tex)
            country=$(echo "$dir" | tr '[:lower:]' '[:upper:]')
            cp "$dir/resume.pdf" "artifacts/ARAVINDH_SIVALINGAM_${country}.pdf"
          done

      - name: Upload PDF Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resumes
          path: artifacts/*.pdf

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: resumes
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: resume-${{ github.run_id }}
          name: Resume - ${{ github.run_number }}
          body: Generated resume PDFs by workflow run ${{ github.run_id }}
          source: ""
          files: |
            artifacts/*.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
